<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Left pillar -->
  <rect x="30" y="50" width="18" height="148" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
  <!-- Right pillar -->
  <rect x="152" y="50" width="18" height="148" rx="2" fill="none" stroke="currentColor" stroke-width="3"/>
  <!-- Pillar bases -->
  <rect x="24" y="190" width="30" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <rect x="146" y="190" width="30" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Lower crossbeam -->
  <rect x="26" y="64" width="148" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Upper crossbeam (extends beyond pillars) -->
  <rect x="18" y="46" width="164" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Decorative top roof (curved) -->
  <path d="M10,48 Q100,10 190,48" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Roof end ornaments -->
  <path d="M10,48 Q6,44 4,38" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <path d="M190,48 Q194,44 196,38" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Center ornament/kanji placeholder -->
  <rect x="80" y="68" width="40" height="6" rx="1" fill="currentColor" opacity="0.25"/>
  <!-- Decorative plate on crossbeam -->
  <rect x="85" y="80" width="30" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
  <!-- Plate symbol -->
  <circle cx="100" cy="92" r="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
</svg>
