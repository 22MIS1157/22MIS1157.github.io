<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Second ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Third ring -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- 8 radiating lines -->
  <line x1="50" y1="8" x2="50" y2="18" stroke="currentColor" stroke-width="1.5"/>
  <line x1="50" y1="82" x2="50" y2="92" stroke="currentColor" stroke-width="1.5"/>
  <line x1="8" y1="50" x2="18" y2="50" stroke="currentColor" stroke-width="1.5"/>
  <line x1="82" y1="50" x2="92" y2="50" stroke="currentColor" stroke-width="1.5"/>
  <!-- Diagonal lines -->
  <line x1="20.3" y1="20.3" x2="27" y2="27" stroke="currentColor" stroke-width="1.5"/>
  <line x1="79.7" y1="20.3" x2="73" y2="27" stroke="currentColor" stroke-width="1.5"/>
  <line x1="20.3" y1="79.7" x2="27" y2="73" stroke="currentColor" stroke-width="1.5"/>
  <line x1="79.7" y1="79.7" x2="73" y2="73" stroke="currentColor" stroke-width="1.5"/>
  <!-- Triangles between rings (top, right, bottom, left) -->
  <polygon points="50,22 44,32 56,32" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <polygon points="78,50 68,44 68,56" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <polygon points="50,78 56,68 44,68" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <polygon points="22,50 32,56 32,44" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <!-- Small circles at diagonal positions -->
  <circle cx="37" cy="37" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="63" cy="37" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="37" cy="63" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <circle cx="63" cy="63" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <!-- Center design -->
  <circle cx="50" cy="50" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="2" fill="currentColor"/>
  <!-- Tick marks on outer ring -->
  <g stroke="currentColor" stroke-width="1" opacity="0.5">
    <line x1="50" y1="2" x2="50" y2="6"/>
    <line x1="73.7" y1="7.6" x2="72" y2="11"/>
    <line x1="92.4" y1="26.3" x2="89" y2="28"/>
    <line x1="98" y1="50" x2="94" y2="50"/>
    <line x1="92.4" y1="73.7" x2="89" y2="72"/>
    <line x1="73.7" y1="92.4" x2="72" y2="89"/>
    <line x1="50" y1="98" x2="50" y2="94"/>
    <line x1="26.3" y1="92.4" x2="28" y2="89"/>
    <line x1="7.6" y1="73.7" x2="11" y2="72"/>
    <line x1="2" y1="50" x2="6" y2="50"/>
    <line x1="7.6" y1="26.3" x2="11" y2="28"/>
    <line x1="26.3" y1="7.6" x2="28" y2="11"/>
  </g>
</svg>
