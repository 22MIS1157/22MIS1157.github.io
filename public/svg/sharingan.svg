<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Iris -->
  <circle cx="50" cy="50" r="42" fill="#c0392b"/>
  <!-- Inner ring connecting tomoe -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <!-- Tomoe 1 (top) -->
  <g transform="rotate(0 50 50)">
    <circle cx="50" cy="28" r="5.5" fill="#1a1a1a"/>
    <path d="M50 28 Q56 20 50 14 Q48 22 44.5 28" fill="#1a1a1a"/>
  </g>
  <!-- Tomoe 2 (bottom-right) -->
  <g transform="rotate(120 50 50)">
    <circle cx="50" cy="28" r="5.5" fill="#1a1a1a"/>
    <path d="M50 28 Q56 20 50 14 Q48 22 44.5 28" fill="#1a1a1a"/>
  </g>
  <!-- Tomoe 3 (bottom-left) -->
  <g transform="rotate(240 50 50)">
    <circle cx="50" cy="28" r="5.5" fill="#1a1a1a"/>
    <path d="M50 28 Q56 20 50 14 Q48 22 44.5 28" fill="#1a1a1a"/>
  </g>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="8" fill="#1a1a1a"/>
  <!-- Highlight -->
  <circle cx="44" cy="40" r="3" fill="rgba(255,255,255,0.25)"/>
</svg>
