<svg viewBox="0 0 40 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Blade (diamond) -->
  <polygon points="20,4 30,40 20,48 10,40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Blade center line -->
  <line x1="20" y1="8" x2="20" y2="44" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <!-- Guard -->
  <rect x="14" y="48" width="12" height="4" rx="1" fill="currentColor" opacity="0.6"/>
  <!-- Handle wrapping -->
  <line x1="16" y1="56" x2="24" y2="58" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="62" x2="24" y2="64" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="68" x2="24" y2="70" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="74" x2="24" y2="76" stroke="currentColor" stroke-width="1.5"/>
  <line x1="16" y1="80" x2="24" y2="82" stroke="currentColor" stroke-width="1.5"/>
  <!-- Handle shaft -->
  <rect x="17" y="52" width="6" height="36" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Ring pommel -->
  <circle cx="20" cy="98" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Ring to handle connector -->
  <line x1="20" y1="88" x2="20" y2="88" stroke="currentColor" stroke-width="2"/>
  <rect x="17" y="86" width="6" height="3" fill="currentColor" opacity="0.5"/>
</svg>
