  <line x1="24" y1="16" x2="24" y2="44" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <line x1="116" y1="16" x2="116" y2="44" stroke="currentColor" stroke-width="1" opacity="0.2"/>
