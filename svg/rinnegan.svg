<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Iris background -->
  <circle cx="50" cy="50" r="44" fill="#c4a6d6"/>
  <!-- Concentric rings -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#6b3a7d" stroke-width="1.6"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="4.5" fill="#2d1238"/>
  <!-- Subtle highlight -->
  <circle cx="44" cy="40" r="3.5" fill="rgba(255,255,255,0.18)"/>
